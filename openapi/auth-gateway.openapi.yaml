openapi: 3.0.3
info:
  title: Hackathon Platform Auth Gateway
  version: 1.0.0
  description: |
    OpenAPI контракт auth-gateway. Источник правды — `hackaton-platform-api/docs/auth/rest-guide.md`.
servers:
  - url: http://localhost:8080
paths:
  /v1/auth/register:
    post:
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          $ref: "#/components/responses/Error"
  /v1/auth/login:
    post:
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/auth/introspect:
    post:
      operationId: authIntrospect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntrospectRequest"
      responses:
        "200":
          description: |
            Protobuf3: при невалидном токене сервер может вернуть пустой объект `{}`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectResponse"
        "400":
          $ref: "#/components/responses/Error"
  /v1/auth/refresh:
    post:
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/auth/logout:
    post:
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Empty object
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        "400":
          $ref: "#/components/responses/Error"
components:
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        message:
          type: string
      required:
        - message

    IdempotencyKey:
      type: object
      additionalProperties: false
      properties:
        key:
          type: string
      required: [key]

    RegisterRequest:
      type: object
      additionalProperties: false
      properties:
        username: { type: string }
        email: { type: string }
        password: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        timezone: { type: string }
        idempotency_key:
          $ref: "#/components/schemas/IdempotencyKey"
      required: [username, email, password, first_name, last_name, timezone]

    LoginRequest:
      description: Login by username or email
      oneOf:
        - type: object
          additionalProperties: false
          properties:
            username: { type: string }
            password: { type: string }
          required: [username, password]
        - type: object
          additionalProperties: false
          properties:
            email: { type: string }
            password: { type: string }
          required: [email, password]

    IntrospectRequest:
      type: object
      additionalProperties: false
      properties:
        access_token: { type: string }
      required: [access_token]

    IntrospectActive:
      type: object
      additionalProperties: false
      properties:
        active: { type: boolean, enum: [true] }
        userId: { type: string }
        expiresAt: { type: string, format: date-time }
      required: [active, userId, expiresAt]

    IntrospectResponse:
      oneOf:
        - $ref: "#/components/schemas/IntrospectActive"
        - type: object
          additionalProperties: false

    RefreshRequest:
      type: object
      additionalProperties: false
      properties:
        refresh_token: { type: string }
      required: [refresh_token]

    LogoutRequest:
      type: object
      additionalProperties: false
      properties:
        refresh_token: { type: string }
      required: [refresh_token]

    TokenPairResponse:
      type: object
      additionalProperties: false
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        accessExpiresAt: { type: string, format: date-time }
        refreshExpiresAt: { type: string, format: date-time }
      required: [accessToken, refreshToken]
