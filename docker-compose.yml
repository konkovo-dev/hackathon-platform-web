services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CENTRIFUGO_WS_URL=${NEXT_PUBLIC_CENTRIFUGO_WS_URL}
        - NEXT_PUBLIC_AVATAR_STORAGE_ORIGIN=${NEXT_PUBLIC_AVATAR_STORAGE_ORIGIN}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PLATFORM_API_BASE_URL=${PLATFORM_API_BASE_URL}
      - AUTH_GATEWAY_BASE_URL=${AUTH_GATEWAY_BASE_URL}
      - FORCE_SECURE_COOKIES=${FORCE_SECURE_COOKIES:-true}
      - NEXT_PUBLIC_CENTRIFUGO_WS_URL=${NEXT_PUBLIC_CENTRIFUGO_WS_URL}
      - NEXT_PUBLIC_AVATAR_STORAGE_ORIGIN=${NEXT_PUBLIC_AVATAR_STORAGE_ORIGIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
